<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8D5A3"/>
      <stop offset="100%" style="stop-color:#C9A844"/>
    </linearGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1810"/>
      <stop offset="100%" style="stop-color:#111008"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1080" fill="url(#bg)"/>

  <!-- Border frame -->
  <rect x="30" y="30" width="1020" height="1020" fill="none" stroke="#C9A844" stroke-width="1.5" opacity="0.4"/>
  <rect x="40" y="40" width="1000" height="1000" fill="none" stroke="#C9A844" stroke-width="0.5" opacity="0.2"/>

  <!-- Top decorative line -->
  <line x1="140" y1="200" x2="940" y2="200" stroke="#C9A844" stroke-width="1" opacity="0.3"/>

  <!-- Logo "البلاغ" -->
  <text x="540" y="320" font-family="Georgia, 'Times New Roman', serif" font-size="130" font-weight="900" text-anchor="middle" fill="url(#gold)">البلاغ</text>

  <!-- Subtitle line -->
  <text x="540" y="390" font-family="Georgia, serif" font-size="28" text-anchor="middle" fill="#9A9070" letter-spacing="2">منبر سياسي تونسي مستقل</text>

  <!-- Divider -->
  <line x1="340" y1="430" x2="740" y2="430" stroke="#C9A844" stroke-width="1.5" opacity="0.5"/>
  <circle cx="540" cy="430" r="4" fill="#C9A844" opacity="0.7"/>

  <!-- Main announcement -->
  <text x="540" y="530" font-family="Georgia, serif" font-size="52" font-weight="700" text-anchor="middle" fill="#F0EAD6">يسعدنا إطلاق موقعنا الرسمي</text>

  <!-- Features -->
  <text x="540" y="640" font-family="Georgia, serif" font-size="34" text-anchor="middle" fill="#9A9070">مقابلات · أخبار · مقالات · ضيوف</text>

  <!-- URL box -->
  <rect x="240" y="700" width="600" height="80" rx="40" fill="none" stroke="#C9A844" stroke-width="2"/>
  <text x="540" y="750" font-family="Georgia, serif" font-size="36" font-weight="700" text-anchor="middle" fill="#C9A844">www.albaalaagh.com</text>

  <!-- Bottom text -->
  <text x="540" y="880" font-family="Georgia, serif" font-size="26" text-anchor="middle" fill="#9A9070">شاركوه مع أصدقائكم</text>

  <!-- Bottom decorative line -->
  <line x1="140" y1="920" x2="940" y2="920" stroke="#C9A844" stroke-width="1" opacity="0.3"/>

  <!-- Corner decorations -->
  <line x1="60" y1="60" x2="120" y2="60" stroke="#C9A844" stroke-width="2" opacity="0.5"/>
  <line x1="60" y1="60" x2="60" y2="120" stroke="#C9A844" stroke-width="2" opacity="0.5"/>
  <line x1="1020" y1="60" x2="960" y2="60" stroke="#C9A844" stroke-width="2" opacity="0.5"/>
  <line x1="1020" y1="60" x2="1020" y2="120" stroke="#C9A844" stroke-width="2" opacity="0.5"/>
  <line x1="60" y1="1020" x2="120" y2="1020" stroke="#C9A844" stroke-width="2" opacity="0.5"/>
  <line x1="60" y1="1020" x2="60" y2="960" stroke="#C9A844" stroke-width="2" opacity="0.5"/>
  <line x1="1020" y1="1020" x2="960" y2="1020" stroke="#C9A844" stroke-width="2" opacity="0.5"/>
  <line x1="1020" y1="1020" x2="1020" y2="960" stroke="#C9A844" stroke-width="2" opacity="0.5"/>
</svg>
