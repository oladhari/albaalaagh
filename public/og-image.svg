<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8D5A3"/>
      <stop offset="100%" style="stop-color:#C9A844"/>
    </linearGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1810"/>
      <stop offset="100%" style="stop-color:#111008"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Border -->
  <rect x="20" y="20" width="1160" height="590" fill="none" stroke="#C9A844" stroke-width="1" opacity="0.4"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#gold)"/>

  <!-- Logo -->
  <text x="600" y="220" font-family="Georgia, serif" font-size="110" font-weight="900" text-anchor="middle" fill="url(#gold)">البلاغ</text>

  <!-- Tagline -->
  <text x="600" y="290" font-family="Georgia, serif" font-size="30" text-anchor="middle" fill="#9A9070">منبر سياسي تونسي مستقل</text>

  <!-- Divider -->
  <line x1="400" y1="330" x2="800" y2="330" stroke="#C9A844" stroke-width="1" opacity="0.4"/>

  <!-- Features row -->
  <text x="230" y="410" font-family="Georgia, serif" font-size="26" text-anchor="middle" fill="#F0EAD6">مقابلات</text>
  <text x="430" y="410" font-family="Georgia, serif" font-size="26" text-anchor="middle" fill="#F0EAD6">أخبار</text>
  <text x="630" y="410" font-family="Georgia, serif" font-size="26" text-anchor="middle" fill="#F0EAD6">مقالات</text>
  <text x="830" y="410" font-family="Georgia, serif" font-size="26" text-anchor="middle" fill="#F0EAD6">ضيوف</text>
  <text x="1000" y="410" font-family="Georgia, serif" font-size="26" text-anchor="middle" fill="#F0EAD6">برامج</text>

  <!-- Dots between -->
  <circle cx="330" cy="403" r="3" fill="#C9A844" opacity="0.5"/>
  <circle cx="530" cy="403" r="3" fill="#C9A844" opacity="0.5"/>
  <circle cx="730" cy="403" r="3" fill="#C9A844" opacity="0.5"/>
  <circle cx="915" cy="403" r="3" fill="#C9A844" opacity="0.5"/>

  <!-- URL -->
  <text x="600" y="530" font-family="Georgia, serif" font-size="32" font-weight="700" text-anchor="middle" fill="#C9A844">www.albaalaagh.com</text>
</svg>
